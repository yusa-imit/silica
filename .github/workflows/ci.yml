name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            zig-x86_64-linux-${{ env.ZIG_VERSION }}
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}

      - name: Install Zig
        run: |
          if [ ! -d "zig-x86_64-linux-${ZIG_VERSION}" ]; then
            wget -q "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -O zig.tar.xz
            tar xf zig.tar.xz
          fi
          echo "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      # Temporarily disabled build cache to debug runner crashes
      # - name: Cache Zig Build
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       .zig-cache
      #       zig-out
      #     key: zig-build-${{ hashFiles('build.zig', 'build.zig.zon') }}-${{ github.sha }}
      #     restore-keys: |
      #       zig-build-${{ hashFiles('build.zig', 'build.zig.zon') }}-
      #       zig-build-

      - name: Build
        run: zig build

      - name: Run Tests
        run: timeout 1200 zig build test  # 20 minute timeout (3232 tests including integration/jepsen)
        continue-on-error: false

      - name: Run Benchmarks
        run: zig build bench
        continue-on-error: true  # Don't fail CI on benchmark failures

  cross-compile:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos-none
          - aarch64-macos-none
          - x86_64-windows-msvc
          - aarch64-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            zig-x86_64-linux-${{ env.ZIG_VERSION }}
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}

      - name: Install Zig
        run: |
          if [ ! -d "zig-x86_64-linux-${ZIG_VERSION}" ]; then
            wget -q "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -O zig.tar.xz
            tar xf zig.tar.xz
          fi
          echo "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silica-${{ matrix.target }}
          path: zig-out/lib/
