name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos-none
          - aarch64-macos-none
          - x86_64-windows-msvc
          - aarch64-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            zig-x86_64-linux-${{ env.ZIG_VERSION }}
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}

      - name: Install Zig
        run: |
          if [ ! -d "zig-x86_64-linux-${ZIG_VERSION}" ]; then
            wget -q "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -O zig.tar.xz
            tar xf zig.tar.xz
          fi
          echo "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          mkdir -p dist
          if [ -d zig-out/lib ]; then
            cp -r zig-out/lib/* dist/ 2>/dev/null || true
          fi
          if [ -d zig-out/bin ]; then
            cp -r zig-out/bin/* dist/ 2>/dev/null || true
          fi
          cd dist && tar czf ../silica-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: silica-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}
          path: silica-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release && sha256sum *.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Downloads

            Download the appropriate archive for your platform and extract it.

            **Verify checksums** after download:
            ```bash
            sha256sum -c checksums.txt
            ```

            ## Supported Platforms

            - `x86_64-linux-gnu`: Linux (x86-64)
            - `aarch64-linux-gnu`: Linux (ARM64)
            - `x86_64-macos-none`: macOS (Intel)
            - `aarch64-macos-none`: macOS (Apple Silicon)
            - `x86_64-windows-msvc`: Windows (x86-64)
            - `aarch64-windows-msvc`: Windows (ARM64)
